services:
  embedder:
    build:
      context: ./components/embedder
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - EMBEDDER_MODEL=mock
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  qdrant_data:
