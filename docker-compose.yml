services:
  embedder:
    build:
      context: ./components/embedder
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - EMBEDDER_MODEL=mock
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
  postgres:
    image: postgres:17-alpine
    environment:
      - POSTGRES_USER=tgss
      - POSTGRES_PASSWORD=tgss
      - POSTGRES_DB=tgss
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgss -d tgss"]
      interval: 5s
      timeout: 5s
      retries: 10
  bot:
    build:
      context: ./components/bot
      dockerfile: Dockerfile
    depends_on:
      embedder:
        condition: service_started
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    environment:
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - SESSION_PATH=/data/tgss
      - CHANNEL_ID=${CHANNEL_ID}
      - INITIAL_INDEX_MONTHS=${INITIAL_INDEX_MONTHS:-3}
      - EMBEDDER_URL=http://embedder:8000
      - QDRANT_HOST=qdrant
      - QDRANT_PORT=6333
      - QDRANT_COLLECTION=posts
      - VECTOR_SIZE=32
      - POSTGRES_DSN=postgresql://tgss:tgss@postgres:5432/tgss
    volumes:
      - ./session:/data

volumes:
  qdrant_data:
  postgres_data:
