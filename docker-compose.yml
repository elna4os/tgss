services:
  embedder:
    build:
      context: ./components/embedder
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - ./components/embedder/.env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 100
      start_period: 10s

  indexer:
    build:
      context: ./components/indexer
      dockerfile: Dockerfile
    depends_on:
      embedder:
        condition: service_healthy
      qdrant:
        condition: service_started
      postgres:
        condition: service_healthy
    env_file:
      - ./components/indexer/.env
    volumes:
      - ./components/indexer/session:/data

  bot:
    build:
      context: ./components/bot
      dockerfile: Dockerfile
    depends_on:
      embedder:
        condition: service_started
      qdrant:
        condition: service_started
    env_file:
      - ./components/bot/.env

  qdrant:
    build:
      context: ./components/qdrant
      dockerfile: Dockerfile
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage

  postgres:
    build:
      context: ./components/postgres
      dockerfile: Dockerfile
    env_file:
      - ./components/postgres/.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tgss -d tgss"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  qdrant_data:
  postgres_data:
